{% extends 'base.html' %}
{% block content %}

<style>
.form-head{
    background:linear-gradient(135deg,#0f172a,#7c3aed);
    color:white;
    padding:24px;
    border-radius:24px;
    box-shadow:0 12px 30px rgba(124,58,237,.25);
}
.form-card{
    border:none;
    border-radius:24px;
    background:white;
    box-shadow:0 14px 35px rgba(0,0,0,.08);
    padding:26px;
}
.form-label{
    font-weight:900;
    color:#0f172a;
}
</style>

<div class="form-head mb-4">
    <h3 class="fw-bold mb-1">📋 {{ page_title }}</h3>
    <div>Add or update student behaviour record</div>
</div>

<div class="form-card">

    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Student</label>
                {{ form.student }}
            </div>

            <div class="col-md-6">
                <label class="form-label">Behaviour Type</label>
                {{ form.behaviour_type }}
            </div>

            <div class="col-md-8">
                <label class="form-label">Title</label>
                {{ form.title }}
            </div>

            <div class="col-md-4">
                <label class="form-label">Points</label>
                {{ form.points }}
            </div>

            <div class="col-md-12">
                <label class="form-label">Description</label>
                {{ form.description }}
            </div>

            <div class="col-md-8">
                <label class="form-label">Action Taken</label>
                {{ form.action_taken }}
            </div>

            <div class="col-md-4 d-flex align-items-end">
                <div class="form-check mb-2">
                    {{ form.parent_notified }}
                    <label class="form-check-label fw-bold">
                        Parent Notified
                    </label>
                </div>
            </div>

        </div>

        <div class="mt-4 d-flex gap-2 flex-wrap">

            <button type="submit" class="btn btn-primary px-4 py-2">
                💾 Save Record
            </button>

            <a href="{% url 'behaviour_record_list' %}" class="btn btn-secondary px-4 py-2">
                ← Back
            </a>

        </div>

    </form>

</div>

{% endblock %}
