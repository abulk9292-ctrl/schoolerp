{% extends 'base.html' %}
{% block content %}

<h3>{{ title }}</h3>

<table class="table table-bordered">
    <tr>
        <th>Student</th>
        <th>Status</th>
        <th>Date</th>
    </tr>

    {% for r in records %}
    <tr>
        <td>{{ r.student }}</td>
        <td>{{ r.status }}</td>
        <td>{{ r.date }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3" class="text-center">No record found</td></tr>
    {% endfor %}
</table>

{% endblock %}
