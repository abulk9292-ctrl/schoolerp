{% extends 'base.html' %}
{% block content %}

<div class="card card-box p-4">
    <h3 class="fw-bold mb-3">Print Report Card</h3>

    <form method="get">
        <div class="row">
            <div class="col-md-6">
                <label>Student</label>
                <select name="student_id" class="form-control" required>
                    <option value="">Select Student</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-6">
                <label>Exam</label>
                <select name="exam_id" class="form-control" required>
                    <option value="">Select Exam</option>
                    {% for e in exams %}
                    <option value="{{ e.id }}">{{ e }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button class="btn btn-success mt-3">Generate Report Card</button>
    </form>
</div>

{% endblock %}
