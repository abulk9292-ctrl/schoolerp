{% extends 'base.html' %}
{% block content %}

<div class="card card-box p-4">
    <h3 class="fw-bold mb-3">Add / Edit Exam</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Save Exam</button>
        <a href="/exams/" class="btn btn-secondary">Back</a>
    </form>
</div>

{% endblock %}
