{% extends 'base.html' %}
{% block content %}

<h3 class="fw-bold mb-3">Bulk Result Entry</h3>

<form method="post">
{% csrf_token %}

<div class="row mb-3">
    <div class="col-md-4">
        <select name="exam" class="form-control">
            {% for e in exams %}
            <option value="{{ e.id }}">{{ e.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-4">
        <button class="btn btn-success">Save Marks</button>
    </div>
</div>

<div class="table-responsive">
<table class="table table-bordered text-center">

<tr>
    <th>Roll</th>
    <th>Name</th>
    {% for s in subjects %}
        <th>{{ s }}</th>
    {% endfor %}
    <th>Total</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student.roll_no }}</td>
    <td>{{ student.student_name }}</td>

    {% for s in subjects %}
    <td>
        <input type="number"
        name="{{ student.id }}_{{ s }}"
        class="form-control marks"
        data-id="{{ student.id }}">
    </td>
    {% endfor %}

    <td id="total_{{ student.id }}">0</td>
</tr>
{% endfor %}

</table>
</div>

</form>

<script>
document.querySelectorAll('.marks').forEach(input => {
    input.addEventListener('input', function(){
        let id = this.dataset.id;
        let inputs = document.querySelectorAll(`[data-id='${id}']`);
        let total = 0;

        inputs.forEach(i => total += parseInt(i.value || 0));

        document.getElementById("total_"+id).innerText = total;
    });
});
</script>

{% endblock %}
