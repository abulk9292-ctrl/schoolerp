<!DOCTYPE html>
<html>
<head>
    <title>Teacher Attendance Test</title>
</head>
<body>

<h2>📸 Teacher Attendance (Selfie + GPS)</h2>

<form method="POST" action="/mobile-api/teacher-attendance/mark/" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Teacher ID:</label><br>
    <input type="number" name="teacher_id" required><br><br>

    <label>Latitude:</label><br>
    <input type="text" name="latitude" id="lat" required><br><br>

    <label>Longitude:</label><br>
    <input type="text" name="longitude" id="long" required><br><br>

    <label>Remarks:</label><br>
    <input type="text" name="remarks"><br><br>

    <label>Selfie:</label><br>
    <input type="file" name="selfie" accept="image/*" capture="camera" required><br><br>

    <button type="submit">📍 Mark Attendance</button>
</form>

<br><br>

<button onclick="getLocation()">📍 Get My Location</button>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("lat").value = position.coords.latitude;
            document.getElementById("long").value = position.coords.longitude;
        });
    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
