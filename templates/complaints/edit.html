{% extends 'base.html' %}
{% block content %}

<h3>Edit Complaint</h3>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" value="{{ complaint.title }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Parent Name</label>
        <input type="text" name="parent_name" value="{{ complaint.parent_name }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control">{{ complaint.description }}</textarea>
    </div>

    <button class="btn btn-success">Update</button>
</form>

{% endblock %}
