{% extends 'base.html' %}
{% block content %}
<style>
    .page-wrap{padding:18px}
    .glass-card{background:#fff;border-radius:18px;box-shadow:0 12px 35px rgba(15,23,42,.08);border:1px solid rgba(15,23,42,.08)}
    .stat-card{border-radius:18px;padding:18px;background:linear-gradient(135deg,#0f172a,#2563eb);color:white;box-shadow:0 12px 30px rgba(37,99,235,.22)}
    .btn-soft{border-radius:12px;font-weight:700}
    .table thead th{background:#f8fafc;font-size:13px;text-transform:uppercase}
    .badge-soft{border-radius:30px;padding:7px 12px;font-weight:700}
</style>

<div class="page-wrap">
    <div class="glass-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0">{{ title }}</h3>
            <a href="{% url 'live_classes:live_class_list' %}" class="btn btn-secondary btn-soft">Back</a>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                    <div class="col-md-6">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<small class="text-danger">{{ field.errors|striptags }}</small>{% endif %}
                    </div>
                {% endfor %}
            </div>
            <button class="btn btn-primary mt-4 btn-soft">Save Live Class</button>
        </form>
    </div>
</div>
{% endblock %}
