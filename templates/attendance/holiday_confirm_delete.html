{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">

    <div class="card shadow border-danger">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Delete Holiday</h4>
        </div>

        <div class="card-body">

            <p>
                Are you sure you want to delete this holiday?
            </p>

            <h5>{{ holiday.title }}</h5>
            <p>Date: {{ holiday.date }}</p>

            <form method="post">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>

                <a href="{% url 'holiday_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>

        </div>
    </div>

</div>

{% endblock %}
