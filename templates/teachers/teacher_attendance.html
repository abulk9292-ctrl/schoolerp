{% extends 'base.html' %}
{% block content %}

<h2>Teacher Attendance ({{ date }})</h2>

<form method="post">
    {% csrf_token %}

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            {% for e in employees %}
            <tr>
                <td>{{ e.name }}</td>
                <td>
                    <select name="status_{{ e.id }}" class="form-select">
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                    </select>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button class="btn btn-success">Save Attendance</button>
</form>

{% endblock %}
