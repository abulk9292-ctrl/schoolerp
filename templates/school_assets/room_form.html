{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header fw-bold">{{ title }}</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                <div class="col-md-6">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="mt-3">
                <button class="btn btn-success">💾 Save</button>
                <a href="{% url 'asset_room_list' %}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
