{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-header fw-bold">{{ title }}</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button class="btn btn-success">Save</button>
            <a href="{% url 'asset_category_list' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
