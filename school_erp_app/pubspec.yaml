name: school_erp_app
description: AL RAHMAN MISSION ERP Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # API
  http: ^1.2.2

  # Location
  geolocator: ^12.0.0

  # Camera / Image
  image_picker: ^1.1.2

  # Local Storage
  shared_preferences: ^2.2.3

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  curved_navigation_bar: ^1.0.6

  # Date Format
  intl: ^0.19.0

  # Icons
  font_awesome_flutter: ^10.7.0

  # JWT / Token
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/